<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Bosh sahifa</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .main-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 400px;
        }

        h1 {
            color: #2d3748;
        }

        .user-badge {
            background: #edf2f7;
            padding: 5px 15px;
            border-radius: 20px;
            color: #4a5568;
            font-weight: bold;
        }

        select {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            font-size: 16px;
        }

        .btn-start {
            background: #48bb78;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            width: 100%;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-start:hover {
            background: #38a169;
            transform: translateY(-2px);
        }

        .logout-link {
            color: #e53e3e;
            text-decoration: none;
            font-size: 14px;
            display: block;
            margin-top: 15px;
        }
    </style>
</head>

<body>
    <div class="main-card">
        <h1>Xush kelibsiz!</h1>
        <span class="user-badge">👤 {{ user }}</span>

        <form action="/test" method="post">
            <p style="color: #718096; margin-top: 25px;">Yo'nalishni tanlang:</p>
            <select name="fan">
                {% for f in fanlar %}
                <option value="{{ f.fan }}">{{ f.fan }}</option>
                {% endfor %}
            </select>
            <button type="submit" class="btn-start">Testni boshlash</button>
        </form>

        <a href="/logout" class="logout-link">Tizimdan chiqish</a>
    </div>
</body>

</html>

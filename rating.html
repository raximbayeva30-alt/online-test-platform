<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Reyting</title>
    <style>
        body {
            font-family: sans-serif;
            background: #f0f2f5;
            padding: 40px;
            text-align: center;
        }

        table {
            width: 80%;
            margin: 0 auto;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        th {
            background: #667eea;
            color: white;
            padding: 15px;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: #f8fafc;
        }

        .btn-back {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: #667eea;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <h1>🏆 Talabalar Reytingi</h1>
    <table>
        <thead>
            <tr>
                <th>№</th>
                <th>Talaba</th>
                <th>Fan</th>
                <th>Ball</th>
                <th>Vaqt</th>
            </tr>
        </thead>
        <tbody>
            {% for r in natijalar %}
            <tr>
                <td>{{ loop.index }}</td>
                <td>{{ r[0] }}</td>
                <td>{{ r[1] }}</td>
                <td><b>{{ r[2] }}</b></td>
                <td>{{ r[3] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <a href="/" class="btn-back">← Orqaga</a>
</body>

</html>

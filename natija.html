<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Natija</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            width: 400px;
        }

        .score {
            font-size: 60px;
            color: #48bb78;
            font-weight: bold;
        }

        .time-info {
            background: #ebf8ff;
            padding: 10px;
            border-radius: 10px;
            margin: 20px 0;
            color: #2b6cb0;
        }

        .btn {
            display: block;
            padding: 12px;
            margin: 10px 0;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
        }

        .btn-rating {
            background: #48bb78;
            color: white;
        }

        .btn-home {
            background: #e2e8f0;
            color: #4a5568;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Natijangiz</h1>
        <div class="score">{{ ball }} / {{ jami }}</div>
        <div class="time-info">⏱ Vaqt: {{ vaqt }}</div>
        <a href="/rating" class="btn btn-rating">🏆 Reytingni ko'rish</a>
        <a href="/" class="btn btn-home">Bosh sahifaga qaytish</a>
    </div>
</body>

</html>

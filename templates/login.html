<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Kirish</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f0f2f5;
            margin: 0;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 320px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <h2>Tizimga kirish</h2>
        <form method="POST">
            <input type="text" name="ism" placeholder="Foydalanuvchi nomi" required>
            <input type="password" name="parol" placeholder="Parol" required>
            <button type="submit">Kirish</button>
        </form>
    </div>
</body>

</html>
